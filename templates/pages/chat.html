<div id="page-chat" class="page">
  <div class="page-header">
    <button class="back-btn" onclick="showPage('home')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="page-title">Talk to me</span>
    <button onclick="newChatSession()" style="margin-left:auto; background:none; border:1px solid var(--border); border-radius:var(--radius-sm); padding:.3rem .7rem; font-size:var(--text-xs); cursor:pointer; color:var(--ink-mid); font-family:var(--font-ui); transition:border-color .15s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">New chat</button>
  </div>

  <div id="chat-log"></div>

  <!-- chat image preview -->
  <div id="chat-img-preview" class="img-preview">
    <img id="chat-img-thumb" alt="">
    <button class="img-preview-close" onclick="clearChatImage()">×</button>
  </div>
  <input type="file" id="chat-img-input" accept="image/*" style="display:none" onchange="onChatImagePicked(this)">

  <div class="status-bar" id="chat-status"></div>
  <div class="input-wrap">
    <button class="rec-btn" id="chat-rec-btn" onclick="toggleRecording('chat')" title="Voice input">
      <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v4M8 23h8"/></svg>
    </button>
    <button class="rec-btn" id="chat-img-btn" onclick="document.getElementById('chat-img-input').click()" title="Attach photo">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <textarea id="chat-input" class="msg-input" rows="1" placeholder="How are you feeling…" maxlength="8000"></textarea>
    <button id="chat-send" class="send-btn" onclick="sendChat()">Send</button>
  </div>
</div>
