<div id="page-journal" class="page">
  <div class="page-header">
    <span class="page-title">Journal</span>
  </div>

  <div id="journal-img-preview" class="img-preview-strip">
    <div class="img-preview-strip-inner">
      <img id="journal-img-thumb" alt="">
      <button class="img-preview-remove" onclick="clearJournalImage()">×</button>
    </div>
  </div>
  <input type="file" id="journal-img-input" accept="image/*" style="display:none" onchange="onJournalImagePicked(this)">

  <div class="journal-body">
    <div class="journal-meta" id="journal-date"></div>
    <textarea id="journal-textarea"
      placeholder="What's on your mind today? Write freely — this is just for you."
      maxlength="8000"></textarea>
  </div>

  <div class="journal-footer">
    <button class="media-btn" id="journal-rec-btn" onclick="toggleRecording('journal')" title="Voice note">
      <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v4M8 23h8"/></svg>
    </button>
    <button class="media-btn" id="journal-img-btn" onclick="document.getElementById('journal-img-input').click()" title="Attach photo">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <span class="word-count" id="journal-word-count"></span>
    <span class="status-bar" id="journal-rec-status"></span>
    <span class="status-bar" id="journal-status"></span>
    <button class="journal-save-btn" id="journal-save" onclick="saveJournal()">Save entry</button>
  </div>
</div>
