<div id="page-reflect" class="page">
  <div class="page-header">
    <button class="back-btn" onclick="showPage('home')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="page-title">Reflect</span>
  </div>

  <div id="reflect-chat-log" class="reflect-chat-log"></div>

  <div class="status-bar" id="reflect-chat-status"></div>
  <div class="input-wrap" id="reflect-input-wrap">
    <textarea id="reflect-chat-input" class="msg-input" rows="1"
      placeholder="Share your thoughts…" maxlength="2000"></textarea>
    <button id="reflect-chat-send" class="send-btn" onclick="sendReflectChat()">Send</button>
  </div>
</div>
