<div id="page-reflect" class="page">
  <div class="page-header">
    <span class="page-title">Reflect</span>
    <button id="reflect-new-btn" class="header-action" onclick="restartReflect()">New</button>
  </div>

  <div id="reflect-chat-log" class="reflect-chat-log"></div>

  <div id="reflect-img-preview" class="img-preview-strip">
    <div class="img-preview-strip-inner">
      <img id="reflect-img-thumb" alt="">
      <button class="img-preview-remove" onclick="clearReflectImage()">×</button>
    </div>
  </div>
  <input type="file" id="reflect-img-input" accept="image/*" style="display:none" onchange="onReflectImagePicked(this)">

  <div class="chat-input-area hidden" id="reflect-input-wrap">
    <button class="media-btn" id="reflect-rec-btn" onclick="toggleRecording('reflect')" title="Voice input">
      <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v4M8 23h8"/></svg>
    </button>
    <button class="media-btn" id="reflect-img-btn" onclick="document.getElementById('reflect-img-input').click()" title="Attach photo">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <textarea id="reflect-chat-input" class="chat-input" rows="1"
      placeholder="Share your thoughts…" maxlength="2000"></textarea>
    <button id="reflect-chat-send" class="send-btn" onclick="sendReflectChat()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="status-bar" id="reflect-chat-status" style="padding:0 16px 4px; flex-shrink:0;"></div>
</div>
