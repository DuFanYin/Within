<div id="page-history" class="page">
  <div class="page-header">
    <span class="page-title">History</span>
  </div>

  <div class="history-toggle">
    <button class="toggle-opt active" id="btn-timeline" onclick="switchView('timeline')">Timeline</button>
    <button class="toggle-opt" id="btn-calendar" onclick="switchView('calendar')">Calendar</button>
  </div>

  <div class="page-scroll">
    <div id="view-timeline">
      <div id="timeline" class="timeline"></div>
    </div>
    <div id="view-calendar" style="display:none;">
      <div class="cal-body">
        <div class="cal-month" id="cal-month-label"></div>
        <div class="cal-grid" id="calendar-grid"></div>
        <div id="cal-day-entries"></div>
      </div>
    </div>
  </div>
</div>
